<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>都卜勒效應模擬</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --bg-card-hover: #f8fafc;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --border-light: #f1f5f9;
      --chart-grid: #f1f5f9;
      --canvas-bg: #ffffff;
      --canvas-border: #e2e8f0;
      --road-fill: #94a3b8;
      --road-stroke: #f59e0b;
      --tick-stroke-major: rgba(0,0,0,0.25);
      --tick-stroke-minor: rgba(0,0,0,0.1);
      --tick-fill: #475569;
      --pole-fill: #64748b;
      --pole-inner: #94a3b8;
      --wave-stroke: rgba(100, 116, 139, 0.8);
      --dash-stroke: rgba(244, 63, 94, 0.5);
    }
    .dark {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --bg-card-hover: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #334155;
      --border-light: #1e293b;
      --chart-grid: #334155;
      --canvas-bg: #0f172a;
      --canvas-border: #334155;
      --road-fill: #475569;
      --road-stroke: #f59e0b;
      --tick-stroke-major: rgba(255,255,255,0.62);
      --tick-stroke-minor: rgba(255,255,255,0.25);
      --tick-fill: #cbd5e1;
      --pole-fill: #0f172a;
      --pole-inner: #1e293b;
      --wave-stroke: rgba(148, 163, 184, 0.8);
      --dash-stroke: rgba(244, 63, 94, 0.32);
    }
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    canvas { touch-action: none; }
    .dark .bg-slate-50 { background: #0f172a !important; }
    .dark .bg-white { background: #1e293b !important; }
    .dark .bg-slate-100 { background: #1e293b !important; }
    .dark .text-slate-800 { color: #f1f5f9 !important; }
    .dark .text-slate-900 { color: #f1f5f9 !important; }
    .dark .text-slate-700 { color: #cbd5e1 !important; }
    .dark .text-slate-500 { color: #94a3b8 !important; }
    .dark .text-slate-400 { color: #64748b !important; }
    .dark .text-slate-600 { color: #94a3b8 !important; }
    .dark .border-slate-100 { border-color: #334155 !important; }
    .dark .border-slate-200 { border-color: #475569 !important; }
    .dark .border-slate-200\/70 { border-color: rgba(71,85,105,0.7) !important; }
    .dark .bg-slate-200 { background: #334155 !important; }
    .dark .bg-slate-900 { background: #0f172a !important; }
    .dark .bg-white\/90 { background: rgba(30,41,59,0.9) !important; }
    .dark .bg-indigo-50 { background: rgba(99,102,241,0.15) !important; }
    .dark .bg-rose-50 { background: rgba(244,63,94,0.15) !important; }
    .dark .hover\:bg-indigo-100:hover { background: rgba(99,102,241,0.25) !important; }
    .dark .hover\:bg-slate-50:hover { background: #334155 !important; }
    .dark .hover\:bg-slate-300:hover { background: #475569 !important; }
    .dark .hover\:bg-rose-100:hover { background: rgba(244,63,94,0.25) !important; }
    .dark .text-indigo-600 { color: #818cf8 !important; }
    .dark .text-indigo-700 { color: #a5b4fc !important; }
    .dark .text-rose-600 { color: #fb7185 !important; }
    .dark .text-rose-700 { color: #fda4af !important; }
    .dark .border-rose-200 { border-color: rgba(244,63,94,0.3) !important; }
    .dark .border-indigo-200 { border-color: rgba(129,140,248,0.3) !important; }
    .dark .accent-indigo-600 { accent-color: #818cf8 !important; }
  </style>
</head>
<body class="min-h-screen text-slate-800" style="background:var(--bg-body);color:var(--text-primary)">
  <div class="fixed top-4 right-4 z-50 flex gap-2">
    <button id="themeBtn" class="rounded-lg border p-2.5 text-sm shadow-sm transition hover:opacity-80" style="background:var(--bg-card);border-color:var(--border-color);color:var(--text-primary)">
      <i id="themeIcon" class="fa-solid fa-moon"></i>
    </button>
    <button id="langBtn" class="rounded-lg border px-3 py-2.5 text-sm font-bold shadow-sm transition hover:opacity-80" style="background:var(--bg-card);border-color:var(--border-color);color:var(--text-primary)">
      <span id="langText">EN</span>
    </button>
  </div>
  <main class="w-full px-4 py-6">
    <header class="mb-6 text-center">
      <h1 class="flex items-center justify-center gap-3 text-3xl font-extrabold tracking-tight text-slate-900">
        <i class="fa-solid fa-wave-square text-indigo-600"></i>
        都卜勒效應：移動聲源與觀測者
      </h1>
      <p class="mt-2 text-base text-slate-500">調整參數會立即反映在動畫、圖表與聲音上；也可以拖曳藍色觀測者改變離馬路的距離。</p>
    </header>

    <div class="grid grid-cols-1 gap-6 lg:grid-cols-12">
      <section id="paramSection" class="lg:col-span-3 rounded-lg border p-6 shadow-sm" style="background:var(--bg-card);border-color:var(--border-color)">
        <h2 class="mb-4 flex items-center gap-2 border-b pb-2 text-xl font-bold" style="border-color:var(--border-light);color:var(--text-primary)">
          <i class="fa-solid fa-sliders text-indigo-600"></i> <span data-i18n="params">參數控制</span>
        </h2>

        <div class="space-y-5">
          <div>
            <div class="mb-1 flex items-center justify-between">
              <label for="paramFreq" class="flex items-center gap-2 text-base font-semibold" style="color:var(--text-primary)"><i class="fa-solid fa-music text-slate-400"></i> 聲源頻率 f0</label>
              <span id="freqVal" class="rounded px-3 py-0.5 text-base font-bold text-indigo-600" style="background:var(--bg-body)">500 Hz</span>
            </div>
            <input id="paramFreq" type="range" min="200" max="1000" step="10" value="500" class="w-full accent-indigo-600">
            <div class="mt-2 grid grid-cols-2 gap-2">
              <button id="pureBtn" class="rounded-lg border border-indigo-200 bg-indigo-50 px-2 py-2 text-xs font-bold text-indigo-700 shadow-sm transition hover:bg-indigo-100"><i class="fa-solid fa-waveform"></i> 純音</button>
              <button id="ambBtn" class="rounded-lg border border-slate-200 bg-white px-2 py-2 text-xs font-bold text-slate-500 shadow-sm transition hover:bg-slate-50"><i class="fa-solid fa-truck-medical"></i> 救護車</button>
              <button id="sweepBtn" class="rounded-lg border border-slate-200 bg-white px-2 py-2 text-xs font-bold text-slate-500 shadow-sm transition hover:bg-slate-50"><i class="fa-solid fa-chart-line"></i> 掃頻</button>
              <button id="multiBtn" class="rounded-lg border border-slate-200 bg-white px-2 py-2 text-xs font-bold text-slate-500 shadow-sm transition hover:bg-slate-50"><i class="fa-solid fa-layer-group"></i> 多音</button>
            </div>
          </div>

          <div>
            <div class="mb-1 flex items-center justify-between">
              <label for="paramSpeed" class="flex items-center gap-2 text-base font-semibold text-slate-700"><i class="fa-solid fa-gauge-high text-slate-400"></i> 汽車最高速度 vs</label>
              <span id="speedVal" class="rounded bg-white px-3 py-0.5 text-base font-bold text-slate-700">100 m/s</span>
            </div>
            <input id="paramSpeed" type="range" min="10" max="500" step="5" value="100" class="w-full accent-indigo-600">
          </div>

          <div>
            <div class="mb-1 flex items-center justify-between">
              <label for="paramTransTime" class="flex items-center gap-2 text-base font-semibold text-slate-700"><i class="fa-solid fa-stopwatch text-slate-400"></i> 加減速時間</label>
              <span id="transTimeVal" class="rounded bg-white px-3 py-0.5 text-base font-bold text-slate-700">0.2 s</span>
            </div>
            <input id="paramTransTime" type="range" min="0.1" max="2.0" step="0.1" value="0.2" class="w-full accent-indigo-600">
          </div>

          <div>
            <div class="mb-1 flex items-center justify-between">
              <label for="paramRoadLength" class="flex items-center gap-2 text-base font-semibold text-slate-700"><i class="fa-solid fa-road text-slate-400"></i> 馬路長度 L</label>
              <span id="roadLengthVal" class="rounded bg-white px-3 py-0.5 text-base font-bold text-slate-700">500 m</span>
            </div>
            <input id="paramRoadLength" type="range" min="100" max="2000" step="50" value="500" class="w-full accent-indigo-600">
          </div>

          <div>
            <div class="mb-1 flex items-center justify-between">
              <label for="paramDist" class="flex items-center gap-2 text-base font-semibold text-slate-700"><i class="fa-solid fa-arrows-up-down text-slate-400"></i> 觀測者離馬路距離 d</label>
              <span id="distVal" class="rounded bg-white px-3 py-0.5 text-base font-bold text-slate-700">50 m</span>
            </div>
            <input id="paramDist" type="range" min="0" max="70" step="5" value="50" class="w-full accent-indigo-600">
          </div>
        </div>

        <div class="mt-6 grid grid-cols-4 gap-2">
          <button id="startBtn" class="flex items-center justify-center gap-2 rounded-lg bg-emerald-600 px-4 py-3 text-base font-bold text-white shadow-sm transition hover:bg-emerald-700">
            <i class="fa-solid fa-play"></i> 模擬
          </button>
          <button id="pauseBtn" class="flex items-center justify-center gap-2 rounded-lg bg-amber-500 px-4 py-3 text-base font-bold text-white shadow-sm transition hover:bg-amber-600 disabled:opacity-40 disabled:cursor-not-allowed" disabled>
            <i id="pauseIcon" class="fa-solid fa-pause"></i> <span id="pauseText">暫停</span>
          </button>
          <button id="stopBtn" class="flex items-center justify-center gap-2 rounded-lg bg-slate-200 px-4 py-3 text-base font-bold text-slate-700 shadow-sm transition hover:bg-slate-300">
            <i class="fa-solid fa-rotate-left"></i> 重設
          </button>
          <button id="muteBtn" class="flex items-center justify-center gap-2 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-base font-bold text-rose-700 shadow-sm transition hover:bg-rose-100">
            <i id="muteIcon" class="fa-solid fa-volume-high"></i> <span id="muteText">聲音</span>
          </button>
        </div>

        <div id="dataSection" class="mt-6 rounded-lg border p-4" style="border-color:var(--border-color);background:var(--bg-card-hover)">
          <h3 class="mb-2 flex items-center gap-2 text-base font-bold" style="color:var(--text-primary)"><i class="fa-solid fa-chart-simple text-amber-500"></i> 即時數據</h3>
          <div class="grid grid-cols-3 gap-2 text-center">
            <div class="rounded-lg border shadow-sm p-3" style="border-color:var(--border-color);background:var(--bg-card)">
              <div id="dataTimeLabel" class="text-xs font-bold uppercase" style="color:var(--text-muted)">時間</div>
              <div id="dataTime" class="font-mono text-xl font-extrabold text-indigo-600">0.00 s</div>
            </div>
            <div class="rounded-lg border shadow-sm p-3" style="border-color:var(--border-color);background:var(--bg-card)">
              <div id="dataSpeedLabel" class="text-xs font-bold uppercase" style="color:var(--text-muted)">車速</div>
              <div id="dataCarSpeed" class="flex h-8 flex-col justify-center font-mono text-sm font-extrabold text-indigo-600">0.0 m/s</div>
            </div>
            <div class="rounded-lg border shadow-sm p-3" style="border-color:var(--border-color);background:var(--bg-card)">
              <div id="dataFreqLabel" class="text-xs font-bold uppercase" style="color:var(--text-muted)">觀測頻率</div>
              <div id="dataObsFreq" class="font-mono text-xl font-extrabold text-rose-600">等待聲波...</div>
            </div>
          </div>
          <div id="phaseIndicator" class="mt-3 text-center text-sm text-slate-500">按「模擬」開始，或拖曳藍色觀測者。</div>
        </div>
      </section>

      <section class="flex flex-col gap-6 lg:col-span-9">
        <div class="relative overflow-hidden rounded-lg border p-4 shadow-sm" style="background:var(--canvas-bg);border-color:var(--canvas-border)">
          <canvas id="simCanvas" width="1600" height="340" class="block h-auto w-full rounded-lg"></canvas>
          <div class="absolute left-4 top-4 flex items-center gap-2 rounded-lg border px-3 py-1 font-mono text-sm shadow-sm backdrop-blur" style="background:var(--bg-card);border-color:var(--border-color);color:var(--text-secondary)">
            <span class="h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
            <span id="roadLenLabel">路長</span> <span id="runningRoadLength">500</span> m
          </div>
          <div class="absolute right-4 top-4 flex items-center gap-2 rounded-lg border px-3 py-1 font-mono text-sm shadow-sm backdrop-blur" style="background:var(--bg-card);border-color:var(--border-color);color:var(--text-secondary)">
            <span id="propagationIndicator" class="h-3 w-3 rounded-full bg-red-500"></span>
            <span id="propagationText">聲波尚未抵達觀測者</span>
          </div>
        </div>

        <div id="chartSection">
          <div class="flex h-[360px] flex-col rounded-lg border p-4 shadow-sm" style="background:var(--bg-card);border-color:var(--border-color)">
            <h3 class="mb-2 flex items-center gap-2 text-base font-bold" style="color:var(--text-primary)"><i class="fa-solid fa-chart-line text-rose-500"></i> 觀測頻率 - 時間</h3>
            <div class="relative flex-1"><canvas id="frequencyChart"></canvas></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const VSOUND = 343;
    const ROAD_Y = 120;
    const MARGIN = 40;
    const RECORD_INTERVAL = 0.003;
    const MAX_CHART_POINTS = 4000;
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    const $ = (id) => document.getElementById(id);
    const controls = {
      freq: $('paramFreq'),
      speed: $('paramSpeed'),
      transTime: $('paramTransTime'),
      roadLength: $('paramRoadLength'),
      dist: $('paramDist')
    };

    let isDark = false;
    let lang = 'zh';
    const i18n = {
      title: { zh: '都卜勒效應：移動聲源與觀測者', en: 'Doppler Effect: Moving Source & Observer' },
      subtitle: { zh: '調整參數會立即反映在動畫、圖表與聲音上；也可以拖曳藍色觀測者改變離馬路的距離。', en: 'Adjust parameters to see real-time changes in animation, chart, and sound. Drag the blue observer to change distance from the road.' },
      params: { zh: '參數控制', en: 'Parameters' },
      freqLabel: { zh: '聲源頻率 f0', en: 'Source Frequency f0' },
      pure: { zh: '純音', en: 'Pure Tone' },
      ambulance: { zh: '救護車', en: 'Ambulance' },
      speedLabel: { zh: '汽車最高速度 vs', en: 'Max Car Speed vs' },
      transLabel: { zh: '加減速時間', en: 'Accel/Decel Time' },
      roadLabel: { zh: '馬路長度 L', en: 'Road Length L' },
      distLabel: { zh: '觀測者離馬路距離 d', en: 'Observer Distance d' },
      simulate: { zh: '模擬', en: 'Simulate' },
      pause: { zh: '暫停', en: 'Pause' },
      resume: { zh: '繼續', en: 'Resume' },
      reset: { zh: '重設', en: 'Reset' },
      sound: { zh: '聲音', en: 'Sound' },
      muted: { zh: '靜音', en: 'Muted' },
      liveData: { zh: '即時數據', en: 'Live Data' },
      time: { zh: '時間', en: 'Time' },
      carSpeed: { zh: '車速', en: 'Speed' },
      obsFreq: { zh: '觀測頻率', en: 'Observed Freq' },
      obsFreqChart: { zh: "觀測頻率 f' (Hz)", en: "Observed Freq f' (Hz)" },
      waiting: { zh: '等待聲波...', en: 'Waiting for wave...' },
      supersonic: { zh: '超音速', en: 'Supersonic' },
      waveProp: { zh: '初始聲波傳播中', en: 'Initial wave propagating' },
      waveNew: { zh: '新頻率聲波傳播中', en: 'New frequency wave propagating' },
      waveArrived: { zh: '聲波已抵達觀測者', en: 'Wave has reached observer' },
      waveNotArrived: { zh: '聲波尚未抵達觀測者', en: 'Wave has not reached observer' },
      waveSupersonic: { zh: '超音速——聲波無法抵達觀測者前', en: 'Supersonic - wave cannot reach observer' },
      phaseAccel: { zh: '加速中', en: 'Accelerating' },
      phaseConstant: { zh: '等速行駛中', en: 'Cruising' },
      phaseDecel: { zh: '減速中', en: 'Decelerating' },
      phaseDone: { zh: '模擬完成', en: 'Simulation complete' },
      phaseIdle: { zh: '按「模擬」開始，或拖曳藍色觀測者。', en: 'Press "Simulate" to start, or drag the blue observer.' },
      chartTitle: { zh: '觀測頻率 - 時間', en: 'Observed Frequency vs Time' },
      chartX: { zh: '時間 (s)', en: 'Time (s)' },
      chartY: { zh: '觀測頻率 (Hz)', en: 'Observed Freq (Hz)' },
      roadLen: { zh: '路長', en: 'Road' },
      initialWave: { zh: '初始位置聲波', en: 'Initial position wave' },
      observer: { zh: '觀測者', en: 'Observer' },
      machCone: { zh: '馬赫錐', en: 'Mach cone' },
      ambulanceLabel: { zh: '救護車', en: 'Ambulance' },
      sweep: { zh: '掃頻', en: 'Sweep' },
      multi: { zh: '多音', en: 'Multi-tone' },
      approaching: { zh: '朝向', en: 'toward' },
      departing: { zh: '遠離', en: 'away' },
      targetSpeed: { zh: '目標速度', en: 'Target speed' },
      accelTo: { zh: '加速至', en: 'Accelerating to' },
      decelTo: { zh: '減速至', en: 'Decelerating to' },
    };

    function applyTheme() {
      const root = document.documentElement;
      if (isDark) {
        root.classList.add('dark');
        document.getElementById('themeIcon').className = 'fa-solid fa-sun';
      } else {
        root.classList.remove('dark');
        document.getElementById('themeIcon').className = 'fa-solid fa-moon';
      }
      document.body.style.background = 'var(--bg-body)';
      document.body.style.color = 'var(--text-primary)';
      if (frequencyChart) {
        const gridColor = getComputedStyle(root).getPropertyValue('--chart-grid').trim() || (isDark ? '#334155' : '#f1f5f9');
        const textColor = getComputedStyle(root).getPropertyValue('--text-primary').trim() || (isDark ? '#f1f5f9' : '#1e293b');
        frequencyChart.options.scales.x.grid.color = gridColor;
        frequencyChart.options.scales.y.grid.color = gridColor;
        frequencyChart.options.plugins.legend.labels.color = textColor;
        try { frequencyChart.update(); } catch(e) {}
      }
    }

    function translateUI() {
      document.querySelector('title').textContent = i18n.title[lang];
      document.querySelector('h1').innerHTML = `<i class="fa-solid fa-wave-square text-indigo-600"></i> ${i18n.title[lang]}`;
      document.querySelector('header p').textContent = i18n.subtitle[lang];
      document.querySelector('#paramSection h2').innerHTML = `<i class="fa-solid fa-sliders text-indigo-600"></i> ${i18n.params[lang]}`;
      document.querySelector('label[for="paramFreq"]').innerHTML = `<i class="fa-solid fa-music text-slate-400"></i> ${i18n.freqLabel[lang]}`;
      document.querySelector('label[for="paramSpeed"]').innerHTML = `<i class="fa-solid fa-gauge-high text-slate-400"></i> ${i18n.speedLabel[lang]}`;
      document.querySelector('label[for="paramTransTime"]').innerHTML = `<i class="fa-solid fa-stopwatch text-slate-400"></i> ${i18n.transLabel[lang]}`;
      document.querySelector('label[for="paramRoadLength"]').innerHTML = `<i class="fa-solid fa-road text-slate-400"></i> ${i18n.roadLabel[lang]}`;
      document.querySelector('label[for="paramDist"]').innerHTML = `<i class="fa-solid fa-arrows-up-down text-slate-400"></i> ${i18n.distLabel[lang]}`;
      document.getElementById('pureBtn').innerHTML = `<i class="fa-solid fa-waveform"></i> ${i18n.pure[lang]}`;
      document.getElementById('ambBtn').innerHTML = `<i class="fa-solid fa-truck-medical"></i> ${i18n.ambulance[lang]}`;
      document.getElementById('sweepBtn').innerHTML = `<i class="fa-solid fa-chart-line"></i> ${i18n.sweep[lang]}`;
      document.getElementById('multiBtn').innerHTML = `<i class="fa-solid fa-layer-group"></i> ${i18n.multi[lang]}`;
      document.getElementById('startBtn').innerHTML = `<i class="fa-solid fa-play"></i> ${i18n.simulate[lang]}`;
      document.getElementById('pauseText').textContent = isPaused ? i18n.resume[lang] : i18n.pause[lang];
      document.getElementById('stopBtn').innerHTML = `<i class="fa-solid fa-rotate-left"></i> ${i18n.reset[lang]}`;
      document.getElementById('muteText').textContent = isMuted ? i18n.muted[lang] : i18n.sound[lang];
      document.querySelector('#dataSection h3').innerHTML = `<i class="fa-solid fa-chart-simple text-amber-500"></i> ${i18n.liveData[lang]}`;
      document.getElementById('dataTimeLabel').textContent = i18n.time[lang];
      document.getElementById('dataSpeedLabel').textContent = i18n.carSpeed[lang];
      document.getElementById('dataFreqLabel').textContent = i18n.obsFreq[lang];
      document.querySelector('#chartSection h3').innerHTML = `<i class="fa-solid fa-chart-line text-rose-500"></i> ${i18n.chartTitle[lang]}`;
      if (frequencyChart) {
        frequencyChart.options.scales.x.title.text = i18n.chartX[lang];
        frequencyChart.options.scales.y.title.text = i18n.chartY[lang];
        frequencyChart.data.datasets[0].label = i18n.obsFreqChart[lang];
        frequencyChart.data.datasets[1].label = `${i18n.obsFreqChart[lang]} ×${MULTI_RATIO}`;
        try { frequencyChart.update(); } catch(e) {}
      }
      document.getElementById('roadLenLabel').textContent = i18n.roadLen[lang];
      document.getElementById('langText').textContent = lang === 'zh' ? 'EN' : '中文';
      // Update running messages
      updatePhaseMessage();
      updatePropagationMessage();
    }

    function updatePhaseMessage() {
      const el = document.getElementById('phaseIndicator');
      if (phase === 'idle' && !isRunning) {
        el.textContent = i18n.phaseIdle[lang];
      }
    }

    function updatePropagationMessage() {
      // Called from step() to update propagation text in correct language
    }

    let f0 = 500;
    let soundType = 'pure';
    const AMB_LOW = 400;
    const AMB_HIGH = 900;
    const AMB_CYCLE = 0.8;
    const SWEEP_CYCLE = 2.0;
    const MULTI_RATIO = 1.5;
    let maxVs = 100;
    let transTime = 0.2;
    let roadLength = 500;
    let distanceY = 50;
    let pixelScale = (canvas.width - MARGIN * 2) / roadLength;

    function updateDistMax() {
      const pixelsBelowRoad = canvas.height - ROAD_Y;
      const maxDist = Math.floor(pixelsBelowRoad * roadLength / (canvas.width - MARGIN * 2) / 5) * 5;
      controls.dist.max = maxDist;
      if (distanceY > maxDist) {
        distanceY = maxDist;
        controls.dist.value = maxDist;
      }
    }
    updateDistMax();

    let carX = MARGIN;
    let carVs = 0;
    let simTime = 0;
    let visualTime = 0;
    let simulationStartVisualTime = 0;
    let isRunning = false;
    let phase = 'idle';
    let lastTimestamp = performance.now();
    let logTimer = 0;
    let waveEmitTimer = 0;
    let carHistory = [];
    let wavefronts = [];
    let audioCtx = null;
    let oscillator = null;
    let gainNode = null;
    let oscillator2 = null;
    let gainNode2 = null;
    let isMuted = false;
    let lastAudioFreq = null;
    let isDraggingObserver = false;
    let lastIdleRecordedFreq = null;
    let stopCooldown = 0;
    let isPaused = false;
    let pausedAudioFreq = null;
    let lastChartUpdate = 0;

    const chartCtx = $('frequencyChart').getContext('2d');
    const CHART_COLORS = ['rgb(244, 63, 94)', 'rgb(56, 189, 248)'];
    const frequencyChart = new Chart(chartCtx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: "觀測頻率 f' (Hz)",
          data: [],
          borderColor: CHART_COLORS[0],
          backgroundColor: 'rgba(244, 63, 94, 0.06)',
          borderWidth: 2.5,
          pointRadius: (context) => {
            const points = context.chart.data.datasets[0].data.length;
            return context.dataIndex === points - 1 ? 5 : 0;
          },
          pointHoverRadius: 5,
          pointBackgroundColor: CHART_COLORS[0],
          tension: 0.15,
          fill: true
        }, {
          label: "f' × 1.5 (Hz)",
          data: [],
          borderColor: CHART_COLORS[1],
          backgroundColor: 'rgba(56, 189, 248, 0.06)',
          borderWidth: 2.5,
          pointRadius: (context) => {
            const points = context.chart.data.datasets[1].data.length;
            return context.dataIndex === points - 1 ? 5 : 0;
          },
          pointHoverRadius: 5,
          pointBackgroundColor: CHART_COLORS[1],
          tension: 0.15,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { display: true, labels: { boxWidth: 12, padding: 8, font: { size: 11 }, color: getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim() || '#1e293b' } } },
        scales: {
          x: { type: 'linear', min: 0, max: 5, title: { display: true, text: '時間 (s)', font: { size: 14 } }, grid: { color: getComputedStyle(document.documentElement).getPropertyValue('--chart-grid').trim() || '#f1f5f9' } },
          y: { min: 0, title: { display: true, text: '觀測頻率 (Hz)', font: { size: 14 } }, grid: { color: getComputedStyle(document.documentElement).getPropertyValue('--chart-grid').trim() || '#f1f5f9' } }
        }
      }
    });

    frequencyChart.getDatasetMeta(1).hidden = true;
    try { frequencyChart.update(); } catch(e) {}

    function formatSpeed(v) {
      return `${v} m/s (${(v * 3.6).toFixed(0)} km/hr)`;
    }

    function getSourceFreq(t) {
      if (soundType === 'ambulance') {
        const cyclePos = (t / AMB_CYCLE) % 1;
        return cyclePos < 0.5 ? AMB_LOW : AMB_HIGH;
      }
      if (soundType === 'sweep') {
        const cyclePos = (t / SWEEP_CYCLE) % 1;
        const tri = cyclePos < 0.5 ? cyclePos * 2 : 2 - cyclePos * 2;
        return 200 + tri * 800;
      }
      return f0;
    }

    function syncUi() {
      if (soundType === 'ambulance') {
        $('freqVal').innerText = `${i18n.ambulanceLabel[lang]} (${AMB_LOW}/${AMB_HIGH} Hz)`;
      } else if (soundType === 'sweep') {
        $('freqVal').innerText = `${i18n.sweep[lang]} (200→1000 Hz)`;
      } else if (soundType === 'multi') {
        $('freqVal').innerText = `${i18n.multi[lang]} (${f0}×1, ${(f0 * MULTI_RATIO).toFixed(0)}×${MULTI_RATIO})`;
      } else {
        $('freqVal').innerText = `${f0} Hz`;
      }
      $('speedVal').innerText = formatSpeed(maxVs);
      $('transTimeVal').innerText = `${transTime.toFixed(1)} s`;
      $('roadLengthVal').innerText = `${roadLength} m`;
      $('runningRoadLength').innerText = roadLength;
      $('distVal').innerText = `${distanceY.toFixed(0)} m`;
    }

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      createAudioNodes();
    }

    function createAudioNodes() {
      if (oscillator) {
        try { oscillator.stop(); } catch(e) {}
        try { oscillator.disconnect(); } catch(e) {}
      }
      if (oscillator2) {
        try { oscillator2.stop(); } catch(e) {}
        try { oscillator2.disconnect(); } catch(e) {}
      }
      if (gainNode) {
        try { gainNode.disconnect(); } catch(e) {}
      }
      if (gainNode2) {
        try { gainNode2.disconnect(); } catch(e) {}
      }
      oscillator = audioCtx.createOscillator();
      gainNode = audioCtx.createGain();
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(getSourceFreq(0), audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.start();
      oscillator2 = audioCtx.createOscillator();
      gainNode2 = audioCtx.createGain();
      oscillator2.type = 'sine';
      oscillator2.frequency.setValueAtTime(getSourceFreq(0) * MULTI_RATIO, audioCtx.currentTime);
      gainNode2.gain.setValueAtTime(0, audioCtx.currentTime);
      oscillator2.connect(gainNode2);
      gainNode2.connect(audioCtx.destination);
      oscillator2.start();
    }

    function ensureAudioActive() {
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (!oscillator || oscillator.state === 'finished' || !oscillator2 || oscillator2.state === 'finished') {
        createAudioNodes();
      }
    }

    function setAudioFrequency(freq) {
      if (!audioCtx) return;
      if (!gainNode) { ensureAudioActive(); if (!gainNode) return; }
      if (!oscillator || oscillator.state === 'finished') { ensureAudioActive(); if (!oscillator) return; }
      try {
        if (freq !== lastAudioFreq) {
          oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.0035);
          lastAudioFreq = freq;
        }
        const vol = isMuted ? 0 : (soundType === 'multi' ? 0.13 : 0.22);
        gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.04);
        if (gainNode2 && oscillator2) {
          const f2 = soundType === 'multi' ? freq * MULTI_RATIO : freq;
          oscillator2.frequency.setTargetAtTime(f2, audioCtx.currentTime, 0.0035);
          gainNode2.gain.setTargetAtTime(soundType === 'multi' ? vol : 0, audioCtx.currentTime, 0.04);
        }
      } catch(e) {}
    }

    function startInitialSound() {
      ensureAudioActive();
    }

    function createWavefront({ birthTime, x = carX, v = carVs, sourceTime = isRunning ? simTime : null, sourceFreq = getSourceFreq(isRunning ? simTime : visualTime) }) {
      return {
        x,
        y: ROAD_Y,
        birthTime,
        sourceTime,
        sourceFreq,
        sourceX: x,
        sourceV: v,
        radius: 0,
        alpha: 0.8
      };
    }

    function preparePreservedWavesForStart() {
      simulationStartVisualTime = visualTime;
      wavefronts.forEach((wave) => {
        const ageAtStart = Math.max(0, simulationStartVisualTime - wave.birthTime);
        wave.sourceTime = -ageAtStart;
        wave.sourceX = wave.x;
        wave.sourceV = 0;
      });
    }

    function clearRecordedData() {
      logTimer = 0;
      frequencyChart.data.labels = [];
      frequencyChart.data.datasets[0].data = [];
      frequencyChart.data.datasets[1].data = [];
      frequencyChart.options.scales.x.min = 0;
      frequencyChart.options.scales.x.max = 5;
      frequencyChart.update();
    }

    function resetSimulationData(options = {}) {
      const preserveWaves = Boolean(options.preserveWaves);
      carX = MARGIN;
      carVs = 0;
      simTime = 0;
      if (!preserveWaves) visualTime = 0;
      phase = 'idle';
      if (!preserveWaves) {
        waveEmitTimer = 0;
        wavefronts = [createWavefront({ birthTime: -0.2, x: carX, v: 0, sourceTime: null, sourceFreq: getSourceFreq(0) })];
      }
      carHistory = [];
      if (!preserveWaves) {
        lastIdleRecordedFreq = null;
        clearRecordedData();
      }
      $('dataTime').innerText = '0.00 s';
      $('dataCarSpeed').innerHTML = '0.0 m/s';
      $('dataObsFreq').innerText = `${f0.toFixed(1)} Hz`;
      $('dataObsFreq').className = 'font-mono text-lg font-extrabold text-rose-600';
      $('phaseIndicator').innerText = i18n.phaseIdle[lang];
      $('propagationIndicator').className = 'h-2.5 w-2.5 rounded-full bg-emerald-500';
      $('propagationText').innerText = i18n.initialWave[lang];
    }

    function resetSimulation() {
      isRunning = false;
      isPaused = false;
      pausedAudioFreq = null;
      $('pauseBtn').disabled = true;
      $('pauseIcon').className = 'fa-solid fa-pause';
      $('pauseText').innerText = i18n.pause[lang];
      resetSimulationData();
      if (gainNode) try { gainNode.gain.setValueAtTime(0, audioCtx.currentTime); } catch(e) {}
      if (gainNode2) try { gainNode2.gain.setValueAtTime(0, audioCtx.currentTime); } catch(e) {}
      draw();
    }

    function togglePause() {
      if (!isRunning) return;
      isPaused = !isPaused;
      if (isPaused) {
        pausedAudioFreq = audioFreq;
        $('pauseIcon').className = 'fa-solid fa-play';
        $('pauseText').innerText = i18n.resume[lang];
      } else {
        pausedAudioFreq = null;
        $('pauseIcon').className = 'fa-solid fa-pause';
        $('pauseText').innerText = i18n.pause[lang];
        lastTimestamp = performance.now();
      }
    }

    function startSimulation() {
      isPaused = false;
      pausedAudioFreq = null;
      $('pauseIcon').className = 'fa-solid fa-pause';
      $('pauseText').innerText = i18n.pause[lang];
      $('pauseBtn').disabled = false;
      resetSimulationData({ preserveWaves: true });
      clearRecordedData();
      lastIdleRecordedFreq = null;
      ensureAudioActive();
      wavefronts.push(createWavefront({ birthTime: visualTime - 0.2, x: carX, v: 0, sourceTime: 0, sourceFreq: getSourceFreq(visualTime) }));
      preparePreservedWavesForStart();
      isRunning = true;
      phase = 'accelerating';
      carHistory = [{ time: 0, x: carX, v: 0 }];
      lastTimestamp = performance.now();
      if (gainNode && audioCtx) {
        try {
          const vol = isMuted ? 0 : (soundType === 'multi' ? 0.13 : 0.22);
          const baseFreq = getSourceFreq(0);
          gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
          oscillator.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
          lastAudioFreq = baseFreq;
          if (gainNode2 && oscillator2) {
            gainNode2.gain.setValueAtTime(soundType === 'multi' ? vol : 0, audioCtx.currentTime);
            oscillator2.frequency.setValueAtTime(soundType === 'multi' ? baseFreq * MULTI_RATIO : baseFreq, audioCtx.currentTime);
          }
        } catch(e) {}
      }
      $('phaseIndicator').innerHTML = `<span class="font-semibold text-amber-500"><i class="fa-solid fa-gauge"></i> ${i18n.accelTo[lang]} ${maxVs} m/s</span>`;
    }

    function recomputeScale(keepCarProgress = true) {
      const progress = keepCarProgress ? Math.max(0, Math.min(1, (carX - MARGIN) / (canvas.width - MARGIN * 2))) : 0;
      pixelScale = (canvas.width - MARGIN * 2) / roadLength;
      carX = MARGIN + progress * (canvas.width - MARGIN * 2);
      wavefronts = [createWavefront({ birthTime: visualTime - 0.2, x: carX, v: carVs, sourceTime: isRunning ? simTime - 0.2 : null, sourceFreq: getSourceFreq(isRunning ? simTime : 0) })];
      carHistory = [];
    }

    function applyLiveParameterChanges() {
      const prevF0 = f0;
      f0 = Number(controls.freq.value);
      const f0Changed = prevF0 !== f0;
      maxVs = Number(controls.speed.value);
      transTime = Number(controls.transTime.value);
      const nextRoadLength = Number(controls.roadLength.value);
      const roadChanged = nextRoadLength !== roadLength;
      roadLength = nextRoadLength;
      distanceY = Number(controls.dist.value);
      if (roadChanged) {
        recomputeScale(true);
        updateDistMax();
      }
      syncUi();
      if (!isRunning) {
        clearRecordedData();
        lastIdleRecordedFreq = null;
        if (f0Changed) {
          wavefronts.push(createWavefront({ birthTime: visualTime, x: carX, v: 0, sourceTime: null, sourceFreq: getSourceFreq(visualTime) }));
        }
      }
      draw();
    }

    Object.values(controls).forEach((input) => input.addEventListener('input', (event) => {
      startInitialSound();
      applyLiveParameterChanges(event);
    }));
    document.addEventListener('pointerdown', startInitialSound, { once: true });
    document.addEventListener('keydown', startInitialSound, { once: true });

    $('themeBtn').addEventListener('click', () => {
      isDark = !isDark;
      applyTheme();
    });
    $('langBtn').addEventListener('click', () => {
      lang = lang === 'zh' ? 'en' : 'zh';
      translateUI();
      syncUi();
      if (!isRunning) draw();
    });

    $('startBtn').addEventListener('click', startSimulation);
    $('pauseBtn').addEventListener('click', togglePause);
    $('stopBtn').addEventListener('click', resetSimulation);
    $('muteBtn').addEventListener('click', () => {
      isMuted = !isMuted;
      $('muteIcon').className = isMuted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
      $('muteText').innerText = isMuted ? i18n.muted[lang] : i18n.sound[lang];
      if (gainNode && audioCtx) {
        const vol = isMuted ? 0 : (soundType === 'multi' ? 0.13 : 0.22);
        gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        if (gainNode2) gainNode2.gain.setValueAtTime(soundType === 'multi' ? vol : 0, audioCtx.currentTime);
      }
    });

    const SOUND_MAP = {
      pure: 'pureBtn',
      ambulance: 'ambBtn',
      sweep: 'sweepBtn',
      multi: 'multiBtn'
    };
    const SOUND_TYPES = Object.keys(SOUND_MAP);

    function setSoundType(type) {
      if (type === soundType) return;
      soundType = type;
      controls.freq.disabled = type === 'ambulance' || type === 'sweep';
      for (const t of SOUND_TYPES) {
        const btn = $(SOUND_MAP[t]);
        const active = t === type;
        btn.className = active
          ? 'rounded-lg border border-indigo-200 bg-indigo-50 px-2 py-2 text-xs font-bold text-indigo-700 shadow-sm transition hover:bg-indigo-100'
          : 'rounded-lg border border-slate-200 bg-white px-2 py-2 text-xs font-bold text-slate-500 shadow-sm transition hover:bg-slate-50';
        btn.title = typeof i18n[t] !== 'undefined' ? i18n[t][lang] : t;
      }
      syncUi();
      clearRecordedData();
      lastIdleRecordedFreq = null;
      if (frequencyChart) {
        frequencyChart.getDatasetMeta(1).hidden = type !== 'multi';
        try { frequencyChart.update(); } catch(e) {}
      }
      if (!isRunning) {
        wavefronts.push(createWavefront({ birthTime: visualTime, x: carX, v: 0, sourceTime: null, sourceFreq: getSourceFreq(visualTime) }));
      }
      draw();
    }

    for (const t of SOUND_TYPES) {
      $(SOUND_MAP[t]).addEventListener('click', () => { startInitialSound(); setSoundType(t); });
    }

    function observerPixelY() {
      return ROAD_Y + distanceY * pixelScale;
    }

    function updateObserverFromPointer(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleY = canvas.height / rect.height;
      const y = (event.clientY - rect.top) * scaleY;
      const meters = (y - ROAD_Y) / pixelScale;
      const clamped = Math.max(Number(controls.dist.min), Math.min(Number(controls.dist.max), meters));
      distanceY = Math.round(clamped / 5) * 5;
      controls.dist.value = distanceY;
      syncUi();
      draw();
    }

    canvas.addEventListener('pointerdown', (event) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (event.clientX - rect.left) * scaleX;
      const y = (event.clientY - rect.top) * scaleY;
      const dx = x - canvas.width / 2;
      const dy = y - observerPixelY();
      if (Math.hypot(dx, dy) <= 28) {
        isDraggingObserver = true;
        canvas.setPointerCapture(event.pointerId);
        updateObserverFromPointer(event);
      }
    });
    canvas.addEventListener('pointermove', (event) => {
      if (isDraggingObserver) updateObserverFromPointer(event);
    });
    canvas.addEventListener('pointerup', () => { isDraggingObserver = false; });
    canvas.addEventListener('pointercancel', () => { isDraggingObserver = false; });

    function getRetardedState(tCurrent) {
      if (!carHistory.length) return null;
      const obsX = canvas.width / 2;
      for (let i = carHistory.length - 1; i > 0; i--) {
        const s0 = carHistory[i - 1];
        const s1 = carHistory[i];
        if (s1.time > tCurrent) continue;
        const dt0 = tCurrent - s0.time;
        const dx0 = (s0.x - obsX) / pixelScale;
        const dist0 = Math.hypot(dx0, distanceY);
        const prop0 = dt0 * VSOUND - dist0;
        const dt1 = tCurrent - s1.time;
        const dx1 = (s1.x - obsX) / pixelScale;
        const dist1 = Math.hypot(dx1, distanceY);
        const prop1 = dt1 * VSOUND - dist1;
        if (prop0 * prop1 <= 0 && Math.abs(prop0 - prop1) > 1e-10) {
          const frac = prop0 / (prop0 - prop1);
          return {
            time: s0.time + frac * (s1.time - s0.time),
            x: s0.x + frac * (s1.x - s0.x),
            v: s0.v + frac * (s1.v - s0.v)
          };
        }
      }
      return null;
    }

    function observedFrequency(retardedState) {
      if (!retardedState) return null;
      const dx = (retardedState.x - canvas.width / 2) / pixelScale;
      const r = Math.hypot(dx, distanceY);
      const cosTheta = r > 0 ? dx / r : 0;
      const radialSpeedTowardObserver = -retardedState.v * cosTheta;
      const denominator = VSOUND - radialSpeedTowardObserver;
      if (denominator <= 1) return -1;
      const srcFreq = getSourceFreq(retardedState.time);
      let f = srcFreq * VSOUND / denominator;
      if (!Number.isFinite(f)) f = srcFreq;
      return Math.max(20, Math.min(5000, f));
    }

    function observedFrequencyFromWave(wave) {
      if (!wave) return null;
      const dx = (wave.sourceX - canvas.width / 2) / pixelScale;
      const r = Math.hypot(dx, distanceY);
      const cosTheta = r > 0 ? dx / r : 0;
      const radialSpeedTowardObserver = -wave.sourceV * cosTheta;
      const denominator = VSOUND - radialSpeedTowardObserver;
      if (denominator <= 1) return -1;
      const emittedFreq = Number.isFinite(wave.sourceFreq) ? wave.sourceFreq : getSourceFreq(0);
      let f = emittedFreq * VSOUND / denominator;
      if (!Number.isFinite(f)) f = emittedFreq;
      return Math.max(20, Math.min(5000, f));
    }


    function hasWaveReachedObserver() {
      const obsX = canvas.width / 2;
      const obsY = observerPixelY();
      return wavefronts.some((wave) => {
        const distancePx = Math.hypot(wave.x - obsX, wave.y - obsY);
        return wave.radius >= distancePx;
      });
    }

    function getLatestReceivedWave() {
      const obsX = canvas.width / 2;
      const obsY = observerPixelY();
      let latest = null;
      for (const wave of wavefronts) {
        if (wave.sourceTime === null || wave.sourceTime > simTime) continue;
        const distancePx = Math.hypot(wave.x - obsX, wave.y - obsY);
        if (wave.radius < distancePx) continue;
        if (!latest || wave.sourceTime > latest.sourceTime) latest = wave;
      }
      return latest;
    }

    function getLatestReachedWave() {
      const obsX = canvas.width / 2;
      const obsY = observerPixelY();
      let latest = null;
      for (const wave of wavefronts) {
        const distancePx = Math.hypot(wave.x - obsX, wave.y - obsY);
        if (wave.radius < distancePx) continue;
        if (!latest || wave.birthTime > latest.birthTime) latest = wave;
      }
      return latest;
    }

    function recordData(time, freq) {
      for (let i = 0; i < 2; i++) {
        const data = frequencyChart.data.datasets[i].data;
        if (data.length >= MAX_CHART_POINTS) {
          const newData = [];
          for (let j = 0; j < data.length; j += 2) {
            newData.push(data[j]);
          }
          frequencyChart.data.datasets[i].data = newData;
        }
      }
      const t = Number(time);
      const f = Number(freq);
      frequencyChart.data.datasets[0].data.push({ x: t, y: f });
      frequencyChart.data.datasets[1].data.push({ x: t, y: soundType === 'multi' ? f * MULTI_RATIO : f });
      frequencyChart.options.scales.x.max = Math.max(5, t + 1);
      const now = performance.now();
      if (now - lastChartUpdate >= 16) {
        frequencyChart.update('none');
        lastChartUpdate = now;
      }
    }

    function step(timestamp) {
      let dt = (timestamp - lastTimestamp) / 1000;
      if (!Number.isFinite(dt) || dt < 0 || dt > 0.1) dt = 0.016;
      lastTimestamp = timestamp;
      if (isPaused) dt = 0;
      visualTime += dt;
      if (isRunning) simTime += dt;

      if (isRunning) {
        const currentMeters = (carX - MARGIN) / pixelScale;
        const acceleration = maxVs / transTime;
        const decelerationDistance = 0.5 * maxVs * transTime;

        if (phase === 'accelerating') {
          carVs = Math.min(maxVs, carVs + acceleration * dt);
          if (carVs >= maxVs) {
            phase = 'constant';
          } else {
            $('phaseIndicator').innerHTML = `<span class="font-semibold text-amber-500"><i class="fa-solid fa-gauge"></i> ${i18n.accelTo[lang]} ${maxVs} m/s</span>`;
          }
        }

        if (phase === 'constant' && carVs !== maxVs) {
          if (carVs < maxVs) {
            carVs = Math.min(maxVs, carVs + acceleration * dt);
            $('phaseIndicator').innerHTML = `<span class="font-semibold text-amber-500"><i class="fa-solid fa-gauge"></i> ${i18n.accelTo[lang]} ${maxVs} m/s</span>`;
          } else {
            carVs = Math.max(maxVs, carVs - acceleration * dt);
            $('phaseIndicator').innerHTML = `<span class="font-semibold text-rose-500"><i class="fa-solid fa-angles-down"></i> ${i18n.decelTo[lang]} ${maxVs} m/s</span>`;
          }
        }

        if (phase === 'constant' && carVs === maxVs) {
          $('phaseIndicator').innerHTML = `<span class="font-semibold text-emerald-500"><i class="fa-solid fa-road"></i> ${i18n.phaseConstant[lang]}</span>`;
        }

        if (phase !== 'decelerating' && phase !== 'stopped' && roadLength - currentMeters <= decelerationDistance) {
          phase = 'decelerating';
          $('phaseIndicator').innerHTML = `<span class="font-semibold text-rose-500"><i class="fa-solid fa-angles-down"></i> ${i18n.phaseDecel[lang]}</span>`;
        }

        if (phase === 'decelerating') {
          carVs = Math.max(0, carVs - acceleration * dt);
          if (carVs <= 0.05 || currentMeters >= roadLength) {
            carVs = 0;
            carX = canvas.width - MARGIN;
            phase = 'stopped';
            stopCooldown = 0;
            $('phaseIndicator').innerHTML = `<span class="font-semibold text-blue-500"><i class="fa-solid fa-flag-checkered"></i> ${i18n.phaseDone[lang]}</span>`;
          }
        }

        if (phase !== 'stopped') {
          carX = Math.min(canvas.width - MARGIN, carX + carVs * pixelScale * dt);
        }
      }

      if (phase === 'stopped' && isRunning) {
        stopCooldown += dt;
        if (stopCooldown > Math.hypot(roadLength / 2, distanceY) / VSOUND + 1.5) {
          isRunning = false;
          isPaused = false;
          $('pauseBtn').disabled = true;
          $('pauseIcon').className = 'fa-solid fa-pause';
          $('pauseText').innerText = i18n.pause[lang];
        }
      }

      if (isRunning || carHistory.length) carHistory.push({ time: simTime, x: carX, v: carVs });
      carHistory = carHistory.filter((state) => simTime - state.time < 8);

      waveEmitTimer += dt;
      const avgFreq = soundType === 'ambulance' ? (AMB_LOW + AMB_HIGH) / 2 : f0;
      const emitInterval = Math.max(0.05, Math.min(0.18, 44 / avgFreq));
      if (waveEmitTimer >= emitInterval) {
        waveEmitTimer = 0;
        wavefronts.push(createWavefront({ birthTime: visualTime, x: carX, v: carVs, sourceTime: isRunning ? simTime : null, sourceFreq: isRunning ? getSourceFreq(simTime) : getSourceFreq(visualTime) }));
      }
      wavefronts.forEach((wave) => {
        const age = visualTime - wave.birthTime;
        wave.radius = VSOUND * age * pixelScale;
        wave.alpha = Math.max(0.8 - age * 0.18, 0);
      });
      wavefronts = wavefronts.filter((wave) => wave.alpha > 0.02);

      const retardedState = getRetardedState(simTime);
      const fObserved = observedFrequency(retardedState);

      let audioFreq = null;
      let muteGain = false;

      if (!isRunning && phase === 'idle') {
        const latestReachedWave = getLatestReachedWave();
        const waveReached = latestReachedWave !== null;
        const latestWave = wavefronts.length ? wavefronts.reduce((a, b) => a.birthTime > b.birthTime ? a : b) : null;
        const latestWaveReached = latestWave && Math.hypot(latestWave.x - canvas.width / 2, latestWave.y - observerPixelY()) <= latestWave.radius;
        $('propagationIndicator').className = waveReached ? 'h-2.5 w-2.5 rounded-full bg-emerald-500' : 'h-2.5 w-2.5 rounded-full bg-red-500';
        if (!waveReached) {
          $('propagationText').innerText = i18n.waveProp[lang];
        } else if (!latestWaveReached) {
          $('propagationText').innerText = i18n.waveNew[lang];
        } else {
          $('propagationText').innerText = i18n.waveArrived[lang];
        }
        if (waveReached) {
          const waveFreq = latestReachedWave.sourceFreq;
          $('dataObsFreq').innerText = `${Number(waveFreq).toFixed(1)} Hz`;
          $('dataObsFreq').className = 'font-mono text-lg font-extrabold text-rose-600';
          audioFreq = waveFreq;
          if (waveFreq !== lastIdleRecordedFreq) {
            recordData(0, waveFreq);
            lastIdleRecordedFreq = waveFreq;
          }
        } else {
          $('dataObsFreq').innerText = i18n.waiting[lang];
          $('dataObsFreq').className = 'font-mono text-sm font-semibold text-slate-400';
          muteGain = true;
        }
      } else if (fObserved === -1) {
        $('propagationIndicator').className = 'h-2.5 w-2.5 rounded-full bg-red-500';
        $('propagationText').innerText = i18n.waveSupersonic[lang];
        $('dataObsFreq').innerText = i18n.supersonic[lang];
        $('dataObsFreq').className = 'font-mono text-lg font-extrabold text-rose-600';
        muteGain = true;
      } else if (fObserved !== null && fObserved !== undefined) {
        $('propagationIndicator').className = 'h-2.5 w-2.5 rounded-full bg-emerald-500';
        $('propagationText').innerText = i18n.waveArrived[lang];
        $('dataObsFreq').innerText = `${fObserved.toFixed(1)} Hz`;
        $('dataObsFreq').className = 'font-mono text-lg font-extrabold text-rose-600';
        audioFreq = fObserved;
        logTimer += dt;
        while (isRunning && logTimer >= RECORD_INTERVAL) {
          const recordTime = Math.max(0, simTime - logTimer + RECORD_INTERVAL);
          logTimer -= RECORD_INTERVAL;
          recordData(recordTime.toFixed(3), fObserved.toFixed(1));
        }
      } else {
        if (isRunning) {
          const reachedWave = getLatestReachedWave();
          if (reachedWave) {
            const playFreq = Number(reachedWave.sourceFreq);
            $('propagationIndicator').className = 'h-2.5 w-2.5 rounded-full bg-emerald-500';
            $('propagationText').innerText = i18n.waveProp[lang];
            $('dataObsFreq').innerText = `${playFreq.toFixed(1)} Hz`;
            $('dataObsFreq').className = 'font-mono text-lg font-extrabold text-rose-600';
            audioFreq = playFreq;
            logTimer += dt;
            while (logTimer >= RECORD_INTERVAL) {
              const recordTime = Math.max(0, simTime - logTimer + RECORD_INTERVAL);
              logTimer -= RECORD_INTERVAL;
              recordData(recordTime.toFixed(3), playFreq.toFixed(1));
            }
          } else {
            $('propagationIndicator').className = 'h-2.5 w-2.5 rounded-full bg-red-500';
            $('propagationText').innerText = i18n.waveNotArrived[lang];
            $('dataObsFreq').innerText = i18n.waiting[lang];
            $('dataObsFreq').className = 'font-mono text-sm font-semibold text-slate-400';
          }
        } else {
          $('propagationIndicator').className = 'h-2.5 w-2.5 rounded-full bg-red-500';
          $('propagationText').innerText = i18n.waveNotArrived[lang];
          $('dataObsFreq').innerText = `${getSourceFreq(0).toFixed(1)} Hz`;
          $('dataObsFreq').className = 'font-mono text-lg font-extrabold text-rose-600';
          muteGain = true;
        }
      }

      if (audioFreq !== null) {
        setAudioFrequency(audioFreq);
      }
      if (muteGain && gainNode && audioCtx) {
        try { gainNode.gain.setValueAtTime(0, audioCtx.currentTime); } catch(e) {}
      }

      $('dataTime').innerText = `${simTime.toFixed(2)} s`;
      $('dataCarSpeed').innerHTML = `<span>${carVs.toFixed(1)} m/s</span><span class="text-[10px] font-normal text-slate-400">${(carVs * 3.6).toFixed(0)} km/hr</span>`;
      draw();
      requestAnimationFrame(step);
    }

    function getCSSVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const centerX = canvas.width / 2;
      const obsY = observerPixelY();
      const roadFill = getCSSVar('--road-fill');
      const roadStroke = getCSSVar('--road-stroke');
      const tickMajor = getCSSVar('--tick-stroke-major');
      const tickMinor = getCSSVar('--tick-stroke-minor');
      const tickFill = getCSSVar('--tick-fill');
      const poleFill = getCSSVar('--pole-fill');
      const poleInner = getCSSVar('--pole-inner');
      const waveStroke = getCSSVar('--wave-stroke');
      const dashStroke = getCSSVar('--dash-stroke');

      ctx.fillStyle = roadFill;
      ctx.fillRect(0, ROAD_Y - 20, canvas.width, 40);
      ctx.strokeStyle = roadStroke;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(0, ROAD_Y);
      ctx.lineTo(canvas.width, ROAD_Y);
      ctx.stroke();
      ctx.setLineDash([]);

      let majorTick = 100;
      let minorTick = 50;
      if (roadLength <= 200) { majorTick = 50; minorTick = 10; }
      else if (roadLength <= 400) { majorTick = 50; minorTick = 25; }
      else if (roadLength > 800) { majorTick = 200; minorTick = 100; }

      ctx.textAlign = 'center';
      ctx.font = '14px monospace';
      for (let m = 0; m <= roadLength; m += minorTick) {
        const x = MARGIN + m * pixelScale;
        const major = m % majorTick === 0;
        ctx.strokeStyle = major ? tickMajor : tickMinor;
        ctx.lineWidth = major ? 1.5 : 1;
        ctx.beginPath();
        ctx.moveTo(x, ROAD_Y - 20);
        ctx.lineTo(x, ROAD_Y - 14);
        ctx.moveTo(x, ROAD_Y + 14);
        ctx.lineTo(x, ROAD_Y + 20);
        ctx.stroke();
        if (major) {
          ctx.fillStyle = tickFill;
          ctx.fillText(`${m}m`, x, ROAD_Y - 27);
        }
      }

      ctx.fillStyle = poleFill;
      ctx.fillRect(centerX - 30, ROAD_Y + 20, 60, canvas.height - ROAD_Y - 20);
      ctx.fillStyle = poleInner;
      ctx.fillRect(centerX - 14, ROAD_Y + 20, 28, canvas.height - ROAD_Y - 20);

      wavefronts.forEach((wave) => {
        if (wave.alpha < 0.04) return;
        if (wave.x + wave.radius < 0 || wave.x - wave.radius > canvas.width) return;
        if (wave.y + wave.radius < 0 || wave.y - wave.radius > canvas.height) return;
        const alpha = wave.alpha;
        const baseColor = isDark ? '148, 163, 184' : '100, 116, 139';
        ctx.strokeStyle = `rgba(${baseColor}, ${alpha})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
        ctx.stroke();
      });

      ctx.strokeStyle = dashStroke;
      ctx.lineWidth = 1.2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(carX, ROAD_Y);
      ctx.lineTo(centerX, obsY);
      ctx.stroke();
      ctx.setLineDash([]);

      if (carVs > VSOUND) {
        const machAngle = Math.asin(VSOUND / carVs);
        const coneLen = Math.min(carX - MARGIN + 200, 600);
        ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(carX, ROAD_Y);
        ctx.lineTo(carX - coneLen * Math.cos(machAngle), ROAD_Y - coneLen * Math.sin(machAngle));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(carX, ROAD_Y);
        ctx.lineTo(carX - coneLen * Math.cos(machAngle), ROAD_Y + coneLen * Math.sin(machAngle));
        ctx.stroke();
        ctx.fillStyle = 'rgba(239, 68, 68, 0.7)';
        ctx.font = 'bold 11px system-ui';
        ctx.textAlign = 'left';
        ctx.fillText(i18n.machCone[lang], carX + 8, ROAD_Y - 8);
      }

      drawCar(carX, ROAD_Y);
      drawObserver(centerX, obsY);
    }

    function drawObserver(x, y) {
      ctx.fillStyle = '#3b82f6';
      ctx.beginPath();
      ctx.arc(x, y, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = isDraggingObserver ? 'rgba(191, 219, 254, 0.95)' : 'rgba(59, 130, 246, 0.45)';
      ctx.lineWidth = isDraggingObserver ? 5 : 3;
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = isDark ? '#1e293b' : '#f8fafc';
      ctx.font = 'bold 11px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(i18n.observer[lang], x, y + 34);
    }

    function drawCar(x, y) {
      ctx.fillStyle = '#f97316';
      ctx.beginPath();
      ctx.roundRect(x - 18, y - 9, 36, 18, 4);
      ctx.fill();
      ctx.fillStyle = '#475569';
      ctx.beginPath();
      ctx.roundRect(x - 8, y - 6, 18, 12, 2);
      ctx.fill();
      ctx.fillStyle = '#cbd5e1';
      ctx.beginPath();
      ctx.moveTo(x + 4, y - 5);
      ctx.lineTo(x + 10, y - 4);
      ctx.lineTo(x + 10, y + 4);
      ctx.lineTo(x + 4, y + 5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fef08a';
      ctx.fillRect(x + 16, y - 7, 2, 3);
      ctx.fillRect(x + 16, y + 4, 2, 3);
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(x - 12, y - 11, 8, 2);
      ctx.fillRect(x + 5, y - 11, 8, 2);
      ctx.fillRect(x - 12, y + 9, 8, 2);
      ctx.fillRect(x + 5, y + 9, 8, 2);
    }

    resetSimulationData();
    applyTheme();
    translateUI();
    syncUi();
    draw();
    requestAnimationFrame(step);
  </script>
</body>
</html>
